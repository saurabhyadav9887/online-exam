<script>

function login(){

document.getElementById("msg").innerText="Checking...";

fetch("https://script.google.com/macros/s/AKfycby9H_TcqqXNSG_8Lbf8Bk-IlUjF6kCY2tSEDBRlKwY3-NtN5LmvOci22QZyTTZU5i_z/exec",
{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
email:document.getElementById("email").value,
rollno:document.getElementById("rollno").value,
password:document.getElementById("password").value
})
})

.then(res=>res.json())
.then(data=>{

if(data.status=="success"){

document.getElementById("tests").style.display="block";
document.getElementById("msg").innerText="Login Success";

}else{
document.getElementById("msg").innerText="Invalid Login";
}

})

.catch(()=>{
document.getElementById("msg").innerText="Server Error";
});

}

function openTest(link){
window.open(link,"_blank");
}

</script>
